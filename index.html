<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 Financial Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: '#0A192F',
              slateGlass: 'rgba(148,163,184,.16)',
              success: '#10B981'
            }
          }
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.0.3/math.min.js" defer></script>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body class="bg-navy text-white min-h-screen">
    <div class="max-w-7xl mx-auto px-4 md:px-8 py-8 space-y-6">
      <header class="glass-card p-6 md:p-8">
        <p class="text-sm uppercase tracking-[0.2em] text-emerald-300">2026 Financial Command Center</p>
        <h1 class="text-2xl md:text-4xl font-extrabold mt-3">Custom Financial Integrity Audit for <span id="cityName">Piedmont Triad</span> Households</h1>
      </header>

      <main class="grid grid-cols-1 xl:grid-cols-2 gap-6">
        <section class="glass-card p-6 space-y-4">
          <h2 class="text-xl font-bold">2026 Tax Sunset Stress Test</h2>
          <div class="grid md:grid-cols-2 gap-4">
            <label class="field">Annual Income <input id="taxIncome" type="number" value="280000" min="25000" step="5000"></label>
            <label class="field">Years to Project <input id="taxYears" type="range" min="5" max="20" value="10"><span id="taxYearsLabel"></span></label>
          </div>
          <canvas id="taxChart" height="160"></canvas>
        </section>

        <section class="glass-card p-6 space-y-4">
          <h2 class="text-xl font-bold">Monte Carlo Retirement Longevity</h2>
          <div class="grid md:grid-cols-2 gap-4">
            <label class="field">Current Assets <input id="mcAssets" type="number" value="1500000" step="10000"></label>
            <label class="field">Withdrawal Rate (%) <input id="mcWithdraw" type="range" min="2" max="8" step="0.1" value="4"><span id="mcWithdrawLabel"></span></label>
            <label class="field">Years in Retirement <input id="mcYears" type="range" min="15" max="40" value="30"><span id="mcYearsLabel"></span></label>
          </div>
          <div class="text-lg">Probability of Success: <strong id="successPct" class="text-emerald-400"></strong></div>
          <canvas id="monteChart" height="160"></canvas>
        </section>

        <section class="glass-card p-6 space-y-4 xl:col-span-2">
          <h2 class="text-xl font-bold">Institutional Fee Audit</h2>
          <div class="grid md:grid-cols-3 gap-4 items-center">
            <label class="field">Portfolio Value <input id="feeAssets" type="number" value="2000000" step="10000"></label>
            <label class="field">Legacy Fee (%) <input id="legacyFee" type="range" min="0.7" max="2" step="0.1" value="1"><span id="legacyFeeLabel"></span></label>
            <label class="field">Fiduciary Fee (%) <input id="fidFee" type="range" min="0.1" max="1" step="0.05" value="0.35"><span id="fidFeeLabel"></span></label>
          </div>
          <div class="grid md:grid-cols-2 gap-6 items-center">
            <canvas id="feeChart" height="160"></canvas>
            <div class="callout">Opportunity Cost Over 30 Years<br><span id="oppCost"></span></div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
